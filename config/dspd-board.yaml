project: DSPD
pages:
- title: DSPD Architecture
  content: "# DSPD — Three Surfaces Architecture\n\n```\n┌──────────────────────────────────────────────────────────────┐\n\
    │  PLANE (DSPD)                    Project Management Surface  │\n│  sprints · cycles · modules · epics · analytics ·\
    \ wiki       │\n│  Primary users: human, PM agent                              │\n└─────────────────────────────┬────────────────────────────────┘\n\
    \                              │  PM agent bridges\n┌─────────────────────────────▼────────────────────────────────┐\n\
    │  OCMC (Mission Control)     Agent Operations Surface         │\n│  task dispatch · heartbeat · board memory · approvals\
    \        │\n│  Primary users: fleet agents                                 │\n└─────────────────────────────┬────────────────────────────────┘\n\
    \                              │  all agents\n┌─────────────────────────────▼────────────────────────────────┐\n│  GitHub\
    \                     Code Surface                     │\n│  PRs · CI · code review · releases                       \
    \    │\n│  Primary users: human, all agents                            │\n└──────────────────────────────────────────────────────────────┘\n\
    ```\n\n## Key Rules\n\n1. PM agent is the sole writer to Plane\n2. OCMC and Plane are NOT the same thing\n3. Separate\
    \ Docker Compose — Plane isolated from OCMC\n4. No shared PostgreSQL\n5. Webhook HMAC verification is mandatory\n"
  content_html: '

    <h1>DSPD — Three Surfaces Architecture</h1>


    <h2>How the Surfaces Connect</h2>

    <table>

    <thead><tr><th>Surface</th><th>Purpose</th><th>Primary Users</th></tr></thead>

    <tbody>

    <tr><td><strong>Plane (DSPD)</strong></td><td>Project management — sprints, epics, analytics, wiki</td><td>Human, PM agent</td></tr>

    <tr><td><strong>OCMC (Mission Control)</strong></td><td>Agent operations — dispatch, heartbeat, approvals</td><td>Fleet
    agents</td></tr>

    <tr><td><strong>GitHub</strong></td><td>Code surface — PRs, CI, code review, releases</td><td>Human, all agents</td></tr>

    </tbody>

    </table>


    <h2>The PM Bridge</h2>

    <p>The project-manager agent is the <strong>sole bridge</strong> between Plane and OCMC:</p>

    <ol>

    <li>Human creates work items in Plane (sprints, stories, epics)</li>

    <li>PM reads Plane → creates corresponding OCMC tasks for agents</li>

    <li>Agent completes OCMC task → PM updates Plane item with results</li>

    <li>Human sees progress in Plane (burn-down, velocity, analytics)</li>

    </ol>


    <h2>Key Rules</h2>

    <ol>

    <li><strong>PM is the sole writer to Plane</strong> — no other agent writes directly</li>

    <li><strong>OCMC and Plane are NOT the same thing</strong> — different purposes</li>

    <li><strong>Separate Docker Compose</strong> — Plane isolated from OCMC</li>

    <li><strong>No shared PostgreSQL</strong> — operational coupling risk too high</li>

    <li><strong>Webhook HMAC verification mandatory</strong> — never process unverified events</li>

    </ol>


    <h2>Links</h2>

    <ul>

    <li><a href="https://github.com/cyberpunk042/devops-solution-product-development">GitHub: DSPD</a></li>

    <li><a href="https://github.com/cyberpunk042/devops-solution-product-development/blob/main/docs/architecture.md">Architecture
    Document</a></li>

    </ul>

    '
- title: DSPD Phase Status
  content: '# DSPD Phases


    ## Phase 0: Foundation ✅

    Architecture, requirements, CLAUDE.md, pyproject.toml.


    ## Phase 1: Self-Host Plane — IN PROGRESS

    Docker compose, setup.sh IaC, workspace, projects, API.


    ## Phase 2: Fleet CLI

    plane_client.py, plane.py CLI, plane_sync.py.

    Code exists — copied from openclaw-fleet. Needs end-to-end testing.


    ## Phase 3: MCP Integration

    Webhook handler (dspd/webhooks.py), Plane MCP for PM, event routing.


    ## Phase 4: Full DSPD

    Multi-project, analytics, velocity, cross-project dependencies.

    '
  content_html: '

    <h1>DSPD Phases</h1>


    <table>

    <thead><tr><th>Phase</th><th>Status</th><th>Description</th></tr></thead>

    <tbody>

    <tr><td><strong>Phase 0: Foundation</strong></td><td>✅ Complete</td><td>Architecture, requirements, CLAUDE.md, pyproject.toml</td></tr>

    <tr><td><strong>Phase 1: Self-Host Plane</strong></td><td>✅ Deployed</td><td>12 containers, 4 projects, mission seeded,
    13 issues, 12 members</td></tr>

    <tr><td><strong>Phase 2: Fleet CLI</strong></td><td>✅ Built</td><td>7 Plane MCP tools, plane_client.py, plane_sync.py,
    fleet-plane skill</td></tr>

    <tr><td><strong>Phase 3: MCP + Events</strong></td><td>✅ Built</td><td>Webhook handler, Plane watcher (120s), event emission
    from all tools</td></tr>

    <tr><td><strong>Phase 4: Full DSPD</strong></td><td>🔶 In Progress</td><td>Multi-project analytics, sync worker, platform
    maturity</td></tr>

    </tbody>

    </table>


    <h2>Event Bus Integration</h2>

    <table>

    <thead><tr><th>Component</th><th>Status</th></tr></thead>

    <tbody>

    <tr><td>CloudEvents event store</td><td>✅ Built — persistent JSONL, seen/unseen tracking</td></tr>

    <tr><td>Event routing engine</td><td>✅ Built — 5-level routing, tag subscriptions</td></tr>

    <tr><td>Chain runner</td><td>✅ Built — 6 surface handlers with PLANE surface</td></tr>

    <tr><td>Plane MCP tools (7)</td><td>✅ Built — status, sprint, sync, create, comment, update, modules</td></tr>

    <tr><td>Plane watcher daemon</td><td>✅ Built — 120s poll, detects new issues/updates/cycles</td></tr>

    <tr><td>Event feed in heartbeat</td><td>✅ Built — agents get unseen events on context load</td></tr>

    </tbody>

    </table>


    <h2>Milestone Documents</h2>

    <ul>

    <li><strong>M-PF01-09:</strong> Full Plane configuration — mostly done (9 items)</li>

    <li><strong>M-SC01-08:</strong> Skills and chains — 6 of 8 done</li>

    <li><strong>M-PM01-10:</strong> Platform maturity — 4 of 10 done</li>

    <li><strong>M-SW01-10:</strong> Sync worker — planned, not started</li>

    <li><strong>M-EB01-20:</strong> Event bus — 8 of 20 done</li>

    <li><strong>M-P01-10:</strong> IaC evolution — partially done</li>

    </ul>

    <p><strong>Total: 67 milestones</strong> — ~30 done, ~37 remaining</p>

    '
