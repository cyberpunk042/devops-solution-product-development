projects:
- identifier: AICP
  name: AI Control Platform
  emoji: 🤖
  description: 'AI Control Platform — personal AI control workspace orchestrating LocalAI and Claude Code through Think/Edit/Act
    modes.

    PRIMARY MISSION: Progressive LocalAI independence. Route work through LocalAI for everything that doesn''t require Claude''s
    reasoning. Target: 80%+ reduction in Claude token usage.

    "Its important that the main first mission for the plane/dspd is to make localAI functional and then make it more and
    more reliable to offload as much as possible the work from claude till one day maybe even try to actually run independently
    as much as possible."

    '
  github: cyberpunk042/devops-expert-local-ai
  network: 2
  views:
    modules: true
    cycles: true
    issue_views: true
    pages: true
  states:
  - name: Backlog
    group: backlog
    color: '#9CA3AF'
  - name: Todo
    group: unstarted
    color: '#3B82F6'
    default: true
  - name: In Progress
    group: started
    color: '#F59E0B'
  - name: In Review
    group: started
    color: '#A855F7'
  - name: Done
    group: completed
    color: '#22C55E'
  - name: Cancelled
    group: cancelled
    color: '#EF4444'
  modules:
  - name: 'Stage 1: Make LocalAI Functional'
    description: 'Assess current state of AICP and LocalAI. Get local inference working on both machines. Verify OpenAI-compatible
      API with standard client libraries. Benchmark latency, throughput, and quality for all target operations. Validate 2-cluster
      network setup with cross-machine inference.


      ASSESSMENT DONE (2026-03-29): 9 models loaded, hermes-3b benchmarked at 10s cold / 1.2s warm. Remaining: cluster verification
      on Machine 2, comprehensive benchmark suite.


      User vision: "we will need to validate the project and make sure we can support all that properly too."'
    status: planned
  - name: 'Stage 2: Route Simple Operations to LocalAI'
    description: 'Build the inference router (fleet/core/inference_router.py) — the critical architecture piece that decides
      what needs reasoning vs what can be handled locally or as direct HTTP calls.


      Key insight: many MCP tool calls are just HTTP requests to the MC API. They do not need an LLM — fleet_read_context
      and fleet_agent_status should be direct API calls, zero tokens consumed.


      The router works WITH the chain runner (M-SC02). When an operation fires, the chain publishes to all surfaces (OCMC,
      GitHub, IRC, Plane, ntfy). The router decides which parts of the chain need LLM processing vs direct execution.


      User vision: "it should only call claude when needed otherwise do mcp / tool calls and whatever"


      User vision: "smart tools, chains that will trigger multiple things for one call or one event and that will keep listening
      to all side and keep in sync"'
    status: planned
  - name: 'Stage 3: Progressive Offload'
    description: 'Move routine operations to LocalAI one by one, with quality validation for each.


      Target operations:

      - Idle heartbeats → LocalAI (zero Claude tokens, just HEARTBEAT_OK)

      - Simple task acceptance → LocalAI (structured plan output)

      - Simple reviews (test pass/fail) → LocalAI (pattern matching)

      - Chat responses (factual, not creative) → LocalAI


      Each offload requires side-by-side quality validation: LocalAI output vs Claude output for the same operation. No regression
      allowed.


      Chain events (from event_chain.py) that are simple notifications can also route to LocalAI for formatting instead of
      Claude.


      User vision: "especially for things and loops and events that do not require heavy works and especially for very well
      defined and structured orders or directives that we can find out how to route perfectly to the right model and tools
      everytime"


      Pace: "ready to put into work safely the agent into moving toward the target at a reasonable pace with proper guidance
      and flow"'
    status: planned
  - name: 'Stage 4: Reliability and Failover'
    description: 'Build graceful degradation between LocalAI and Claude. Agents should never know which backend they are talking
      to — the control plane handles routing transparently.


      If LocalAI fails → automatic Claude fallback

      If Claude is rate-limited → queue work for LocalAI where possible

      Cluster peering: Machine 1 LocalAI can serve Machine 2 fleet

      Load balancing between clusters

      Health monitoring dashboard for both inference backends


      User vision: "having our full 2 cluster LocalAI peered in the network with one Plane and eventually 2 or even 3 fleets"'
    status: planned
  - name: 'Stage 5: Near-Independent Operation'
    description: 'The long-term target. Fleet runs primarily on LocalAI for routine operations. Claude called only for complex
      code, architecture, security, strategic planning.


      Targets:

      - 80%+ of fleet operations run on LocalAI (measured over 1 week)

      - Fleet survives Claude outages (degraded but functional)

      - Token cost reduction documented with before/after comparison

      - Continuous optimization process running

      - Multiple fleets, multiple clusters, one Plane


      User vision: "make it more and more reliable to offload as much as possible the work from claude till one day maybe
      even if probably not entirely even try to actually run independently as much as possible"


      User vision: "having our full 2 cluster LocalAI peered in the network with one Plane and eventually 2 or even 3 fleets.
      there will be multiple stage to this including trial of the multiple features and attempt to put in place and such"'
    status: planned
  - name: Core Platform
    description: 'AICP core primitives: controller, Think/Edit/Act mode enforcement, backend routing.


      The aicp/ package has 46 modules including controller.py, router.py, modes.py, guardrails/. Assessment needed: what
      is wired up end-to-end, what is scaffolding.


      Guardrails: Think mode blocks writes, Edit mode controls scope, Act mode has command allowlist. Path protection and
      secret filtering always active.


      User vision: "we need to really make this strong."'
    status: planned
  - name: Integrations
    description: 'Backend integrations connecting AICP to inference providers.


      LocalAI: localhost:8090, OpenAI-compatible API, 9 models loaded.

      Claude Code: subprocess invocation, opus for complex, sonnet for standard.


      Key challenge: single-active GPU backend (8GB VRAM). Strategy: keep hermes-3b warm for heartbeats, swap to hermes/codellama
      for heavy work, phi-2 as CPU fallback.


      Model warmup strategy must account for the chain system — when a chain fires, the router needs to know which model is
      currently warm to avoid unnecessary swaps.'
    status: planned
