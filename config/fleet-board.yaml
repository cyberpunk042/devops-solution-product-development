project: OF
pages:
- title: Fleet Architecture
  content: "# OpenClaw Fleet Architecture\n\n10 autonomous AI agents managed through OpenClaw gateway + Mission Control.\n\
    \n## Surfaces\n\n| Surface | Purpose | Driver |\n|---------|---------|--------|\n| OCMC | Agent operations, dispatch,\
    \ approvals | fleet-ops (board lead) |\n| Plane | Project management, sprints, analytics | project-manager |\n| IRC |\
    \ Real-time alerts and interaction | all agents |\n| GitHub | Code review, PRs, CI | all agents |\n| ntfy | Human notifications\
    \ | all agents |\n\n## Agent Roster\n\n| Agent | Primary Role | Secondary (when idle) | Heartbeat |\n|-------|-------------|----------------------|-----------|\n\
    | fleet-ops | Board lead, reviews, operations | Quality improvement, gap detection | 30m |\n| project-manager | Sprint\
    \ planning, Plane bridge | Cross-project dependency analysis | 35m |\n| devsecops-expert | Security reviews, scanning\
    \ | Dependency audit, credential rotation | 55m |\n| architect | System design, decisions | Complexity assessment for\
    \ PM | 60m |\n| software-engineer | Implementation | Code quality, refactoring proposals | 65m |\n| qa-engineer | Testing,\
    \ QA | Coverage analysis, regression risk | 70m |\n| devops | Infrastructure, CI/CD | Pipeline improvements, monitoring\
    \ | 75m |\n| technical-writer | Documentation | Doc gap detection, onboarding | 80m |\n| ux-designer | UI/UX design |\
    \ Accessibility audit, design system | 85m |\n| accountability-generator | Governance, NNRT | Evidence chain validation\
    \ | 90m |\n\n## Orchestrator (The Brain)\n\nRuns every 30 seconds. 6 steps:\n1. Security scan\n2. Ensure review approvals\
    \ exist\n3. Wake fleet-ops for pending reviews\n4. Dispatch unblocked inbox tasks (max 2/cycle)\n5. Evaluate parent task\
    \ completion\n6. Health check (stuck tasks, offline agents)\n\nSafety: budget monitor (OAuth API), effort profiles (conservative\
    \ default),\nerror reporter, outage detector, max 2 dispatches per cycle.\n\n## Chain Architecture\n\nOne fleet operation\
    \ produces a CHAIN of events across surfaces:\n\n```\nfleet_task_complete()\n  → INTERNAL: MC task→review, approval, board\
    \ memory\n  → PUBLIC: branch push, PR creation\n  → CHANNEL: IRC #fleet + #reviews\n  → NOTIFY: ntfy notification\n  →\
    \ PLANE: issue updated (when Plane present)\n  → META: metrics, sync tracking\n```\n\nChain builders exist (event_chain.py).\
    \ Chain RUNNER not built yet (M-SC02).\nMCP tools currently do individual API calls instead of emitting chains.\n"
  content_html: "\n<h1>OpenClaw Fleet Architecture</h1>\n<p>10 autonomous AI agents managed through OpenClaw gateway + Mission\
    \ Control.</p>\n\n<h2>Surfaces</h2>\n<table>\n<thead><tr><th>Surface</th><th>Purpose</th><th>Driver</th></tr></thead>\n\
    <tbody>\n<tr><td><strong>OCMC</strong></td><td>Agent operations, dispatch, approvals</td><td>fleet-ops (board lead)</td></tr>\n\
    <tr><td><strong>Plane</strong></td><td>Project management, sprints, analytics</td><td>project-manager</td></tr>\n<tr><td><strong>IRC</strong></td><td>Real-time\
    \ alerts and interaction</td><td>all agents</td></tr>\n<tr><td><strong>GitHub</strong></td><td>Code review, PRs, CI</td><td>all\
    \ agents</td></tr>\n<tr><td><strong>ntfy</strong></td><td>Human notifications</td><td>all agents</td></tr>\n</tbody>\n\
    </table>\n\n<h2>Agent Roster</h2>\n<table>\n<thead><tr><th>Agent</th><th>Primary Role</th><th>Secondary (idle)</th><th>Heartbeat</th></tr></thead>\n\
    <tbody>\n<tr><td><strong>fleet-ops</strong></td><td>Board lead, reviews</td><td>Quality, gap detection</td><td>30m</td></tr>\n\
    <tr><td><strong>project-manager</strong></td><td>Sprint planning, Plane</td><td>Dependency analysis</td><td>35m</td></tr>\n\
    <tr><td><strong>devsecops-expert</strong></td><td>Security reviews</td><td>Dependency audit</td><td>55m</td></tr>\n<tr><td><strong>architect</strong></td><td>System\
    \ design</td><td>Complexity assessment</td><td>60m</td></tr>\n<tr><td><strong>software-engineer</strong></td><td>Implementation</td><td>Code\
    \ quality</td><td>65m</td></tr>\n<tr><td><strong>qa-engineer</strong></td><td>Testing, QA</td><td>Coverage analysis</td><td>70m</td></tr>\n\
    <tr><td><strong>devops</strong></td><td>Infrastructure</td><td>Pipeline improvements</td><td>75m</td></tr>\n<tr><td><strong>technical-writer</strong></td><td>Documentation</td><td>Doc\
    \ gap detection</td><td>80m</td></tr>\n<tr><td><strong>ux-designer</strong></td><td>UI/UX design</td><td>Accessibility\
    \ audit</td><td>85m</td></tr>\n<tr><td><strong>accountability-gen</strong></td><td>Governance, NNRT</td><td>Evidence validation</td><td>90m</td></tr>\n\
    </tbody>\n</table>\n\n<h2>Orchestrator (The Brain)</h2>\n<p>Runs every 30 seconds. 6 steps:</p>\n<ol>\n<li>Security scan</li>\n\
    <li>Ensure review approvals exist</li>\n<li>Wake fleet-ops for pending reviews</li>\n<li>Dispatch unblocked inbox tasks\
    \ (max 2/cycle)</li>\n<li>Evaluate parent task completion</li>\n<li>Health check (stuck tasks, offline agents)</li>\n\
    </ol>\n<p><strong>Safety:</strong> budget monitor (OAuth API), effort profiles (conservative default), error reporter,\
    \ outage detector.</p>\n\n<h2>Chain Architecture</h2>\n<p>One fleet operation produces a <strong>CHAIN</strong> of events\
    \ across surfaces:</p>\n<pre><code>fleet_task_complete()\n  → INTERNAL: MC task→review, approval, board memory\n  → PUBLIC:\
    \ branch push, PR creation\n  → CHANNEL: IRC #fleet + #reviews\n  → NOTIFY: ntfy notification\n  → PLANE: issue updated\
    \ (when Plane present)\n  → META: metrics, sync tracking</code></pre>\n<p>Chain builders exist (<code>event_chain.py</code>).\
    \ Chain <strong>RUNNER not built yet</strong> (M-SC02).</p>\n\n<h2>Links</h2>\n<ul>\n<li><a href=\"https://github.com/cyberpunk042/openclaw-fleet\"\
    >GitHub: openclaw-fleet</a></li>\n<li><a href=\"https://github.com/cyberpunk042/openclaw-fleet/blob/main/docs/milestones/STATUS-TRACKER.md\"\
    >STATUS-TRACKER</a></li>\n</ul>\n"
- title: Fleet Operational Status
  content: '# Fleet Operational Status


    Updated by fleet-ops and orchestrator.


    ## Services


    | Service | URL | Status |

    |---------|-----|--------|

    | MC API | localhost:8000 | Running |

    | MC UI | localhost:3000 | Running |

    | Gateway | ws://localhost:18789 | Running (4GB heap) |

    | IRC | localhost:6667 | Running (10 channels) |

    | The Lounge | localhost:9000 | Running |

    | LocalAI | localhost:8090 | Running (9 models) |

    | Plane | localhost:8080 | Running (4 projects) |


    ## Known Gaps


    - Chain runner not built (M-SC02) — MCP tools bypass chains

    - No Plane MCP tools (M-SC04) — PM can''t access Plane from sessions

    - 29 autonomy milestones NOT STARTED

    - Event-driven wake not built (MM1)

    - Agent event filtering not built (MM8)

    - Things built but never verified running (see STATUS-TRACKER.md)

    '
