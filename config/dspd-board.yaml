- title: Build Plane content rendering skill (M-PM08)
  type: Story
  priority: medium
  assignee: technical-writer@fleet.local
  labels:
  - docs
  description_html: '<h2>Context</h2>

    <p>When agents create content in Plane, it must be <strong>properly formatted HTML</strong> — not plain text. Need a skill
    and/or utility for generating rich Plane content.</p>


    <h2>Templates Needed</h2>

    <table>

    <thead><tr><th>Template</th><th>Used For</th><th>Elements</th></tr></thead>

    <tbody>

    <tr><td>Issue description</td><td>Creating work items</td><td>Context, steps, acceptance criteria, links</td></tr>

    <tr><td>Sprint report</td><td>Cycle completion</td><td>Velocity, burn-down, highlights, blockers</td></tr>

    <tr><td>Page content</td><td>Architecture, requirements</td><td>Tables, diagrams, cross-references</td></tr>

    <tr><td>Comment</td><td>Progress, review, decision</td><td>Status, summary, next steps</td></tr>

    </tbody>

    </table>


    <h2>References</h2>

    <ul>

    <li>Existing display module: <code>fleet/core/event_display.py</code></li>

    <li>Fleet-plane skill: <code>.claude/skills/fleet-plane/SKILL.md</code></li>

    </ul>'
