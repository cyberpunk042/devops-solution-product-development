  description_html: '<h2 class="editor-heading-block" data-id="d701ae52-064b-4985-9f37-130fea804eca">Context</h2><p class="editor-paragraph-block"
    data-id="465d7e77-04d8-4e6c-9584-b375c99f4138">LocalAI verified on <strong>Machine 1</strong>:</p><table data-id="23c5a171-22a7-4a2f-9d4c-b41bc96f7cd1"><tbody><tr
    style=""><th colspan="1" rowspan="1" colwidth="150" background="none" hidecontent="false" class="" style=""><p class="editor-paragraph-block"
    data-id="de359dbc-c6d7-4cb5-bd55-eb87c51694e4">Model</p></th><th colspan="1" rowspan="1" colwidth="150" background="none"
    hidecontent="false" class="" style=""><p class="editor-paragraph-block" data-id="c94ce84b-bc14-4e87-9484-6bb5b52f4f99">Cold
    Start</p></th><th colspan="1" rowspan="1" colwidth="150" background="none" hidecontent="false" class="" style=""><p class="editor-paragraph-block"
    data-id="ea35aaa8-9715-468c-853d-e06434b97190">Warm</p></th></tr><tr style=""><td colspan="1" rowspan="1" colwidth="150"
    hidecontent="false" class="" style=""><p class="editor-paragraph-block" data-id="58bdfc46-b81a-4ffc-81cf-f77bd8ff92cd">hermes-3b
    (3B)</p></td><td colspan="1" rowspan="1" colwidth="150" hidecontent="false" class="" style=""><p class="editor-paragraph-block"
    data-id="b43145d8-732f-4886-9551-bc718ca8860a">~10s</p></td><td colspan="1" rowspan="1" colwidth="150" hidecontent="false"
    class="" style=""><p class="editor-paragraph-block" data-id="e6350995-0ed9-4b9d-8d29-6764dfd773fe"><strong>~1.2s</strong></p></td></tr><tr
    style=""><td colspan="1" rowspan="1" colwidth="150" hidecontent="false" class="" style=""><p class="editor-paragraph-block"
    data-id="66db8b43-9371-4bee-b574-3a7e40a957fe">hermes (7B)</p></td><td colspan="1" rowspan="1" colwidth="150" hidecontent="false"
    class="" style=""><p class="editor-paragraph-block" data-id="76b7a2b6-f3ae-4f89-a9bc-8129a92f58f8">~80s</p></td><td colspan="1"
    rowspan="1" colwidth="150" hidecontent="false" class="" style=""><p class="editor-paragraph-block" data-id="07538131-374f-44f1-bbc3-57ce30e78fa7">~1s</p></td></tr></tbody></table><p
    class="editor-paragraph-block" data-id="73449b2e-a3a6-43df-9c91-5232903801f3">Machine 2 needs the same setup and cross-machine
    inference verification.</p><h2 class="editor-heading-block" data-id="23af0737-0f66-4fa5-ae73-ee99ae81f7da">Steps</h2><ol
    class="list-decimal pl-7 space-y-[--list-spacing-y] tight" data-id="71857b36-8d7b-4952-8259-9bbf5a63aad1" data-tight="true"><li
    class="not-prose space-y-2" data-id="04ea51be-553d-4ea0-88eb-ebe9b1691d4e"><p class="editor-paragraph-block" data-id="4782c717-2f2f-4291-bc04-e6213b54e038">Install
    LocalAI on Machine 2 (Docker + GPU)</p></li><li class="not-prose space-y-2" data-id="719d1f49-38a7-4bf0-811d-fdd3b91de5ad"><p
    class="editor-paragraph-block" data-id="37efd7b8-38bc-4865-888b-57d74eecba1f">Copy model configs from Machine 1</p></li><li
    class="not-prose space-y-2" data-id="218ddd6e-ecc4-47c7-915d-36a53d172d7f"><p class="editor-paragraph-block" data-id="96e0a119-a1ce-45fe-8413-abbee724ecd4">Verify
    hermes-3b loads and responds</p></li><li class="not-prose space-y-2" data-id="ce2df0a5-9ef5-4ffb-ae04-a35f93e9fea1"><p
    class="editor-paragraph-block" data-id="4c0593da-7eaa-40ed-b325-cda15e2fb185">Test cross-machine inference: Machine 1
    → Machine 2 API call</p></li><li class="not-prose space-y-2" data-id="98099dce-5f2b-4449-b925-7eec7d74305a"><p class="editor-paragraph-block"
    data-id="166d1a2a-2121-48a0-9709-1b657f9d650d">Benchmark and document results</p></li></ol><h2 class="editor-heading-block"
    data-id="8db9c3fd-cf95-43ec-9134-3cf1ce083bd4">Acceptance Criteria</h2><ul class="list-disc pl-7 space-y-[--list-spacing-y]
    tight" data-id="e83f1bcf-7d02-43b7-8174-5fec14cf6d70" data-tight="true"><li class="not-prose space-y-2" data-id="74d4afc1-74b4-4680-893a-ff0f0dd41cad"><p
    class="editor-paragraph-block" data-id="858d8907-f3e1-4f52-876d-93e2cdda30fd">LocalAI running on Machine 2 with hermes-3b</p></li><li
    class="not-prose space-y-2" data-id="59598a6e-2eaf-4306-94b6-333d44efb6d8"><p class="editor-paragraph-block" data-id="a48bfccc-8d4b-40e9-b307-f467c6811f91">Cross-machine
    inference works (Machine 1 calls Machine 2 API)</p></li><li class="not-prose space-y-2" data-id="e5b335db-356f-4dbe-8a23-5a30c3e4aa7f"><p
    class="editor-paragraph-block" data-id="80eafd53-00e8-419f-b6c7-3708969013a8">Benchmark results documented (latency p50/p95)</p></li></ul><h2
    class="editor-heading-block" data-id="ff8960b2-81b5-480b-af5e-7558749e2e01">Infrastructure Target</h2><blockquote data-id="c282aba0-af5b-48ee-8696-c4b00324bd21"><p
    class="editor-paragraph-block" data-id="3f839b86-82b5-4c39-9b9e-609e597c5f3b">"having our full 2 cluster LocalAI peered
    in the network with one Plane and eventually 2 or even 3 fleets"</p></blockquote>'
