epic_details:
  Setup:
    priority: urgent
    notes: 'Docker, IaC, mission seed. setup.sh install must work end-to-end.

      config/mission.yaml defines the mission structure.

      All scripts must be idempotent.

      '
  Integration:
    priority: high
    notes: 'Fleet CLI: fleet plan create/list/sync/status.

      plane_client.py copied from fleet — needs import verification.

      PM agent bridge between Plane and OCMC.

      '
  Sync:
    priority: high
    notes: 'Bidirectional: Plane items → OCMC tasks, OCMC done → Plane updated.

      plane_sync.py exists. Needs end-to-end testing with live instances.

      '
  Customization:
    priority: medium
    notes: 'Webhooks with HMAC, Plane MCP server for PM, analytics.

      dspd/webhooks.py built. scripts/plane-setup-webhooks.sh built.

      '
