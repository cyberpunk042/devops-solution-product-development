project: OF
pages:
- title: Fleet Architecture
  content: "# OpenClaw Fleet Architecture\n\n10 autonomous AI agents managed through OpenClaw gateway + Mission Control.\n\
    \n## Surfaces\n\n| Surface | Purpose | Driver |\n|---------|---------|--------|\n| OCMC | Agent operations, dispatch,\
    \ approvals | fleet-ops (board lead) |\n| Plane | Project management, sprints, analytics | project-manager |\n| IRC |\
    \ Real-time alerts and interaction | all agents |\n| GitHub | Code review, PRs, CI | all agents |\n| ntfy | Human notifications\
    \ | all agents |\n\n## Agent Roster\n\n| Agent | Primary Role | Secondary (when idle) | Heartbeat |\n|-------|-------------|----------------------|-----------|\n\
    | fleet-ops | Board lead, reviews, operations | Quality improvement, gap detection | 30m |\n| project-manager | Sprint\
    \ planning, Plane bridge | Cross-project dependency analysis | 35m |\n| devsecops-expert | Security reviews, scanning\
    \ | Dependency audit, credential rotation | 55m |\n| architect | System design, decisions | Complexity assessment for\
    \ PM | 60m |\n| software-engineer | Implementation | Code quality, refactoring proposals | 65m |\n| qa-engineer | Testing,\
    \ QA | Coverage analysis, regression risk | 70m |\n| devops | Infrastructure, CI/CD | Pipeline improvements, monitoring\
    \ | 75m |\n| technical-writer | Documentation | Doc gap detection, onboarding | 80m |\n| ux-designer | UI/UX design |\
    \ Accessibility audit, design system | 85m |\n| accountability-generator | Governance, NNRT | Evidence chain validation\
    \ | 90m |\n\n## Orchestrator (The Brain)\n\nRuns every 30 seconds. 6 steps:\n1. Security scan\n2. Ensure review approvals\
    \ exist\n3. Wake fleet-ops for pending reviews\n4. Dispatch unblocked inbox tasks (max 2/cycle)\n5. Evaluate parent task\
    \ completion\n6. Health check (stuck tasks, offline agents)\n\nSafety: budget monitor (OAuth API), effort profiles (conservative\
    \ default),\nerror reporter, outage detector, max 2 dispatches per cycle.\n\n## Chain Architecture\n\nOne fleet operation\
    \ produces a CHAIN of events across surfaces:\n\n```\nfleet_task_complete()\n  → INTERNAL: MC task→review, approval, board\
    \ memory\n  → PUBLIC: branch push, PR creation\n  → CHANNEL: IRC #fleet + #reviews\n  → NOTIFY: ntfy notification\n  →\
    \ PLANE: issue updated (when Plane present)\n  → META: metrics, sync tracking\n```\n\nChain builders exist (event_chain.py).\
    \ Chain RUNNER not built yet (M-SC02).\nMCP tools currently do individual API calls instead of emitting chains.\n"
  content_html: "\n<h1>OpenClaw Fleet Architecture</h1>\n<p>10 autonomous AI agents managed through OpenClaw gateway + Mission\
    \ Control.</p>\n\n<h2>Surfaces</h2>\n<table>\n<thead><tr><th>Surface</th><th>Purpose</th><th>Driver</th></tr></thead>\n\
    <tbody>\n<tr><td><strong>OCMC</strong></td><td>Agent operations, dispatch, approvals</td><td>fleet-ops (board lead)</td></tr>\n\
    <tr><td><strong>Plane</strong></td><td>Project management, sprints, analytics</td><td>project-manager</td></tr>\n<tr><td><strong>IRC</strong></td><td>Real-time\
    \ alerts and interaction</td><td>all agents</td></tr>\n<tr><td><strong>GitHub</strong></td><td>Code review, PRs, CI</td><td>all\
    \ agents</td></tr>\n<tr><td><strong>ntfy</strong></td><td>Human notifications</td><td>all agents</td></tr>\n</tbody>\n\
    </table>\n\n<h2>Agent Roster</h2>\n<table>\n<thead><tr><th>Agent</th><th>Primary Role</th><th>Secondary (idle)</th><th>Heartbeat</th></tr></thead>\n\
    <tbody>\n<tr><td><strong>fleet-ops</strong></td><td>Board lead, reviews</td><td>Quality, gap detection</td><td>30m</td></tr>\n\
    <tr><td><strong>project-manager</strong></td><td>Sprint planning, Plane</td><td>Dependency analysis</td><td>35m</td></tr>\n\
    <tr><td><strong>devsecops-expert</strong></td><td>Security reviews</td><td>Dependency audit</td><td>55m</td></tr>\n<tr><td><strong>architect</strong></td><td>System\
    \ design</td><td>Complexity assessment</td><td>60m</td></tr>\n<tr><td><strong>software-engineer</strong></td><td>Implementation</td><td>Code\
    \ quality</td><td>65m</td></tr>\n<tr><td><strong>qa-engineer</strong></td><td>Testing, QA</td><td>Coverage analysis</td><td>70m</td></tr>\n\
    <tr><td><strong>devops</strong></td><td>Infrastructure</td><td>Pipeline improvements</td><td>75m</td></tr>\n<tr><td><strong>technical-writer</strong></td><td>Documentation</td><td>Doc\
    \ gap detection</td><td>80m</td></tr>\n<tr><td><strong>ux-designer</strong></td><td>UI/UX design</td><td>Accessibility\
    \ audit</td><td>85m</td></tr>\n<tr><td><strong>accountability-gen</strong></td><td>Governance, NNRT</td><td>Evidence validation</td><td>90m</td></tr>\n\
    </tbody>\n</table>\n\n<h2>Orchestrator (The Brain)</h2>\n<p>Runs every 30 seconds. 6 steps:</p>\n<ol>\n<li>Security scan</li>\n\
    <li>Ensure review approvals exist</li>\n<li>Wake fleet-ops for pending reviews</li>\n<li>Dispatch unblocked inbox tasks\
    \ (max 2/cycle)</li>\n<li>Evaluate parent task completion</li>\n<li>Health check (stuck tasks, offline agents)</li>\n\
    </ol>\n<p><strong>Safety:</strong> budget monitor (OAuth API), effort profiles (conservative default), error reporter,\
    \ outage detector.</p>\n\n<h2>Chain Architecture</h2>\n<p>One fleet operation produces a <strong>CHAIN</strong> of events\
    \ across surfaces:</p>\n<pre><code>fleet_task_complete()\n  → INTERNAL: MC task→review, approval, board memory\n  → PUBLIC:\
    \ branch push, PR creation\n  → CHANNEL: IRC #fleet + #reviews\n  → NOTIFY: ntfy notification\n  → PLANE: issue updated\
    \ (when Plane present)\n  → META: metrics, sync tracking</code></pre>\n<p>Chain builders + chain runner built (<code>event_chain.py</code>\
    \ + <code>chain_runner.py</code>). Event bus wired end-to-end.</p>\n\n<h2>Links</h2>\n<ul>\n<li><a href=\"https://github.com/cyberpunk042/openclaw-fleet\"\
    >GitHub: openclaw-fleet</a></li>\n<li><a href=\"https://github.com/cyberpunk042/openclaw-fleet/blob/main/docs/milestones/STATUS-TRACKER.md\"\
    >STATUS-TRACKER</a></li>\n</ul>\n"
- title: Fleet Operational Status
  content: '# Fleet Operational Status


    Updated by fleet-ops and orchestrator.


    ## Services


    | Service | URL | Status |

    |---------|-----|--------|

    | MC API | localhost:8000 | Running |

    | MC UI | localhost:3000 | Running |

    | Gateway | ws://localhost:18789 | Running (4GB heap) |

    | IRC | localhost:6667 | Running (10 channels) |

    | The Lounge | localhost:9000 | Running |

    | LocalAI | localhost:8090 | Running (9 models) |

    | Plane | localhost:8080 | Running (4 projects) |


    ## Known Gaps


    - Chain runner not built (M-SC02) — MCP tools bypass chains

    - No Plane MCP tools (M-SC04) — PM can''t access Plane from sessions

    - 29 autonomy milestones NOT STARTED

    - Event-driven wake not built (MM1)

    - Agent event filtering not built (MM8)

    - Things built but never verified running (see STATUS-TRACKER.md)

    '
  content_html: '

    <h1>Fleet Operational Status</h1>

    <p>Updated by fleet-ops and orchestrator.</p>


    <h2>Services</h2>

    <table>

    <thead><tr><th>Service</th><th>URL</th><th>Status</th></tr></thead>

    <tbody>

    <tr><td>MC API</td><td><code>localhost:8000</code></td><td>✅ Running</td></tr>

    <tr><td>MC UI</td><td><code>localhost:3000</code></td><td>✅ Running</td></tr>

    <tr><td>Gateway</td><td><code>ws://localhost:18789</code></td><td>✅ Running (4GB heap + self-healing)</td></tr>

    <tr><td>IRC</td><td><code>localhost:6667</code></td><td>✅ Running (10 channels)</td></tr>

    <tr><td>The Lounge</td><td><code>localhost:9000</code></td><td>✅ Running</td></tr>

    <tr><td>LocalAI</td><td><code>localhost:8090</code></td><td>✅ Running (9 models)</td></tr>

    <tr><td>Plane</td><td><code>localhost:8080</code></td><td>✅ Running (4 projects, 13 issues)</td></tr>

    </tbody>

    </table>


    <h2>Event Bus (The Nervous System)</h2>

    <table>

    <thead><tr><th>Component</th><th>Status</th><th>Details</th></tr></thead>

    <tbody>

    <tr><td>Event Store</td><td>✅ Built</td><td>CloudEvents JSONL, persistent, seen/unseen</td></tr>

    <tr><td>Event Router</td><td>✅ Built</td><td>5-level routing (direct, priority, mention, tag, broadcast)</td></tr>

    <tr><td>Chain Runner</td><td>✅ Built</td><td>6 surface handlers (INTERNAL, PUBLIC, CHANNEL, NOTIFY, PLANE, META)</td></tr>

    <tr><td>MCP Event Emission</td><td>✅ Wired</td><td>10 tools emit CloudEvents</td></tr>

    <tr><td>Agent Event Feed</td><td>✅ Wired</td><td>fleet_read_context includes unseen events</td></tr>

    <tr><td>Plane Watcher</td><td>✅ Built</td><td>120s poll, detects new issues/updates/cycles</td></tr>

    <tr><td>Sync Events</td><td>✅ Wired</td><td>PR merge/close emit events</td></tr>

    </tbody>

    </table>


    <h2>Daemons (5 concurrent)</h2>

    <table>

    <thead><tr><th>Daemon</th><th>Interval</th><th>Purpose</th></tr></thead>

    <tbody>

    <tr><td>Sync</td><td>60s</td><td>GitHub PR ↔ OCMC task sync</td></tr>

    <tr><td>Auth</td><td>120s</td><td>Token refresh</td></tr>

    <tr><td>Monitor</td><td>300s</td><td>Health check + self-healing gateway</td></tr>

    <tr><td>Orchestrator</td><td>30s</td><td>6-step cycle: scan, approve, wake, dispatch, parents, health</td></tr>

    <tr><td>Plane Watcher</td><td>120s</td><td>Detect Plane changes, emit events</td></tr>

    </tbody>

    </table>


    <h2>MCP Tools (20)</h2>

    <table>

    <thead><tr><th>Tool</th><th>Events</th></tr></thead>

    <tbody>

    <tr><td>fleet_task_complete</td><td>fleet.task.completed → fleet-ops</td></tr>

    <tr><td>fleet_task_accept</td><td>fleet.task.accepted</td></tr>

    <tr><td>fleet_task_create</td><td>fleet.task.created</td></tr>

    <tr><td>fleet_approve</td><td>fleet.task.approved / rejected → assigned agent</td></tr>

    <tr><td>fleet_chat</td><td>fleet.chat.message / mention → @agent feeds</td></tr>

    <tr><td>fleet_alert</td><td>fleet.alert.posted → fleet-ops</td></tr>

    <tr><td>fleet_escalate</td><td>fleet.escalation → fleet-ops (urgent)</td></tr>

    <tr><td>fleet_pause</td><td>fleet.task.blocked → PM</td></tr>

    <tr><td>fleet_plane_create_issue</td><td>fleet.plane.issue_created</td></tr>

    <tr><td>fleet_plane_comment</td><td>fleet.plane.issue_commented → @mentions</td></tr>

    <tr><td colspan="2"><em>+ 10 more tools (read_context, progress, commit, notify_human, plane_status, plane_sprint, plane_sync,
    plane_update_issue, plane_list_modules, agent_status)</em></td></tr>

    </tbody>

    </table>


    <h2>Remaining Gaps</h2>

    <ul>

    <li>🔶 MCP tools not yet using ChainRunner (individual calls, not chains) — M-EB15</li>

    <li>🔶 Adaptive display per channel not built — M-EB16</li>

    <li>🔶 Cross-reference automation not built — M-EB17</li>

    <li>🔶 IaC config differential sync not built — M-EB18</li>

    <li>🔶 29 autonomy milestones still NOT STARTED</li>

    <li>🔶 No agent has completed a real task yet</li>

    </ul>


    <h2>Test Coverage</h2>

    <p><strong>381 tests passing</strong> — event store (15), chain runner (9), event router (16), + 341 existing</p>

    '
epic_details:
  Core:
    priority: high
    acceptance_criteria:
    - Orchestrator cycles every 30s without errors for 24h
    - Budget monitor reads real Claude quota before dispatch
    - Effort profiles switch correctly (fleet pause/resume)
    - Task scoring dispatches by priority order
    notes: 'The orchestrator is working but the chain runner is the critical gap.

      MCP tools do 5 separate API calls where one chain emission would suffice.

      M-SC02 (chain runner) and M-SC03 (wire MCP tools) are the next steps.

      '
  MCP:
    priority: high
    acceptance_criteria:
    - All 13 existing tools verified with real running agents
    - Plane MCP tools added (M-SC04) — PM can read/write Plane
    - Tools emit event chains instead of individual API calls (M-SC03)
    notes: '13 tools built, none verified live. The immediate need is Plane MCP

      tools so the PM can drive sprints. Then wire all tools to emit chains.

      '
  Agents:
    priority: medium
    acceptance_criteria:
    - All 10 heartbeats fire and agents respond correctly
    - fleet-ops reviews at least one task through full approval flow
    - PM breaks down at least one epic into tasks via fleet_task_create
    notes: 'All 10 agents online. Heartbeats configured (30-90m staggered).

      Need live verification — no agent has actually executed a real task yet.


      Agent roles defined in config/fleet-roles.yaml:

      - fleet-ops drives OCMC (reviews, quality, monitoring)

      - PM drives Plane (sprints, backlog, velocity)

      - Others have secondary responsibilities when idle

      '
  Infrastructure:
    priority: medium
    acceptance_criteria:
    - setup.sh runs clean from zero on a fresh machine
    - Gateway survives 24h without OOM crash
    - IRC channels active with agent messages
    - Communication verification passes 8/8
    notes: 'Setup works end-to-end. Gateway has 4GB heap fix + self-healing restart

      in monitor daemon. Communication verified (8/8 checks passed).

      '
  Autonomy:
    priority: low
    acceptance_criteria:
    - Event chain runner built and tested (M-SC02)
    - At least one MCP tool emits chains (M-SC03)
    - Stuck agent detection working
    notes: '29 NOT STARTED milestones. Long-term work. The chain runner is the

      foundation — everything else in autonomy builds on it.


      Event chain model exists with builders for task_complete, alert,

      sprint_complete. Smart chains (DispatchContext) pre-compute context.

      But nothing RUNS the chains yet.

      '
  Tests:
    priority: high
    acceptance_criteria:
    - 341 fleet tests passing (currently all green)
    - At least one integration test against live fleet
    notes: '341 unit tests passing. pytest-asyncio installed. No live integration

      tests yet — all tests use mocks.

      '
cycles:
- name: Fleet Operational Validation
  duration_days: 14
  description: 'Validate fleet is operational end-to-end. All tools verified live.

    At least one agent completes a real task through the full review chain.

    '
  goals:
  - Daemons stable for 24h
  - Orchestrator cycling without errors
  - At least one real task dispatched and completed
  - Review chain verified (task → review → approve → done)
  - fleet_chat verified between agents
  epics:
  - Core
  - MCP
starter_issues:
- title: Verify fleet_chat tool works between real agents
  type: Task
  priority: high
  assignee: fleet-ops@fleet.local
  labels:
  - mcp
  description_html: '<div><h2>Context</h2>

    <p><code>fleet_chat</code> MCP tool is built but <strong>never tested with real agents</strong>. An agent needs to post
    to #fleet via fleet_chat and verify the message appears in IRC.</p>


    <h2>Steps</h2>

    <ol>

    <li>Agent calls <code>fleet_chat("Test message from fleet-ops", channel="#fleet")</code></li>

    <li>Verify message appears in The Lounge IRC client (<a href="http://localhost:9000" rel="noopener noreferrer">localhost:9000</a>)</li>

    <li>Test @mention routing: <code>fleet_chat("@architect please review", channel="#fleet")</code></li>

    <li>Verify architect''s event feed shows the mention on next heartbeat</li>

    </ol>


    <h2>Acceptance Criteria</h2>

    <ul>

    <li>Message appears in IRC within 5 seconds</li>

    <li>@mention creates fleet.chat.mention event in event store</li>

    <li>Mentioned agent sees event in fleet_read_context feed</li>

    </ul>


    <h2>Links</h2>

    <ul>

    <li>IRC: <a href="http://localhost:9000" rel="noopener noreferrer">The Lounge</a> (fleet/fleet)</li>

    <li>Event store: <code>.fleet-events.jsonl</code></li>

    </ul></div>'
