  modules:
  - name: Setup
    description: 'Docker (12 services), IaC (setup.sh install), mission seed (plane-seed-mission.sh reads config/mission.yaml),
      project layout, nginx proxy, env templates.


      setup.sh handles: secrets generation, service startup, admin user creation, workspace/project configuration, mission
      seeding, API validation, startup verification, fleet credential export.


      Plane is OPTIONAL. When present, the IaC configures it fully. When absent, fleet works on OCMC alone.'
  - name: Integration
    description: 'Fleet CLI (fleet plan create/list/sync/status), plane_client.py (typed async REST client), PM agent as the
      bridge between Plane and OCMC.


      The PM is the sole writer to Plane. Plane MCP tools (M-SC04) will give PM native access from heartbeat sessions. Plane
      skill (M-SC05) will teach PM sprint management.


      Other agents interact with Plane only through task comments directed at PM.'
  - name: Sync
    description: 'Bidirectional Plane ↔ OCMC sync. Human creates in Plane → PM evaluates → OCMC task created → agent works
      → completes → chain syncs back to Plane.


      Sync is fleet-tagged in multi-fleet: each fleet syncs its own tasks.

      Plane↔OCMC sync will be integrated into orchestrator cycle (M-SC07).


      Graceful degradation: if Plane is down, chains mark PLANE events as failed, fleet continues on OCMC.'
  - name: Customization
    description: 'Webhooks (HMAC verified), Plane MCP server for PM, analytics, velocity tracking, burn-down

      '
