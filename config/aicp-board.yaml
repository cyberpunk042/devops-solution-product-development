# aicp-board.yaml — AICP mission content for Plane
#
# This is the PRIMARY mission. LocalAI independence is the first and most
# important work the fleet will do through Plane.
#
# The PM agent reads these epics and creates tasks from them.
# The epic descriptions contain the user's vision (verbatim quotes),
# the technical direction, and acceptance criteria.

project: AICP

# ═══════════════════════════════════════════════════════════════════════════
# PAGES — Living documents the PM and agents reference
# ═══════════════════════════════════════════════════════════════════════════

pages:
  - title: "AICP Architecture"
    content: |
      # AICP — AI Control Platform Architecture

      ## Core Concept

      AICP orchestrates local and cloud AI backends through a unified controller.
      The user is always in control — AI backends are tools, not masters.

      ```
      User → AICP Controller → Router → (LocalAI | Claude Code) → Project/Repo
                                  │
                                  ├── Does this need reasoning?
                                  │   NO → LocalAI (local, free, fast)
                                  │         ├── 3B model for structured responses
                                  │         ├── MCP tool calls (direct HTTP, no LLM)
                                  │         └── Template-based responses
                                  │   YES → Claude (cloud, paid, powerful)
                                  │         ├── opus for complex (architecture, security, planning)
                                  │         └── sonnet for standard (implementation, review)
      ```

      ## Three Permission Modes

      - Think — read, analyze, plan. No edits, no commands.
      - Edit — modify files in a controlled scope. Produce patches/diffs.
      - Act — run commands, workflows, tools. Highest power, most controlled.

      ## Routing Table

      | Operation | Today (Claude) | Target (LocalAI) |
      |-----------|---------------|-------------------|
      | Heartbeat check (no work) | Claude session (~8K tokens) | LocalAI (0 Claude tokens) |
      | fleet_read_context | Claude tool call | Direct API call (no LLM) |
      | fleet_agent_status | Claude tool call | Direct API call |
      | fleet_chat post | Claude session | LocalAI or direct API |
      | Simple task acceptance | Claude session | LocalAI (structured response) |
      | Complex implementation | Claude (opus) | Claude (opus) — KEEP |
      | Architecture design | Claude (opus) | Claude (opus) — KEEP |
      | Security analysis | Claude (opus) | Claude (opus) — KEEP |

      ## LocalAI Assessment (2026-03-29)

      | Model | Cold Start | Warm | Use Case |
      |-------|------------|------|----------|
      | hermes-3b (3B) | ~10s | ~1.2s | Fleet heartbeats (TARGET) |
      | hermes (7B) | ~80s | ~1s | Complex reasoning |
      | codellama (7B) | ~80s | ~1s | Code tasks |
      | phi-2 (2.7B) | CPU | CPU | Fallback |

  - title: "LocalAI Independence — Strategic Vision"
    content: |
      # The Mission — LocalAI Independence

      ## User Vision (Verbatim)

      > "Its important that the main first mission for the plane/dspd is to make
      > localAI functional and then make it more and more reliable to offload as
      > much as possible the work from claude till one day maybe even if probably
      > not entirely even try to actually run independently as much as possible,
      > especially for things and loops and events that do not require heavy works
      > and especially for very well defined and structured orders or directives
      > that we can find out how to route perfectly to the right model and tools
      > everytime for a mix of multiple advantages so it will be multiple targets
      > always aligned with the same mission of being more independent and having
      > our full 2 cluster LocalAI peered in the network with one Plane and
      > eventually 2 or even 3 fleets."

      > "We will continue working with the fleet for now till we are really at
      > this point and ready to put into work safely the agent into moving toward
      > the target at a reasonable pace with proper guidance and flow and keeping
      > in the loop and making sure that the requirements are the right one and
      > the planning the right one and that the project Plane will be used
      > accordingly and engrained into them."

      > "important to remember the plane place and yet how oc agent still work
      > on ocmc, that's why we need smart tools, chains that will trigger
      > multiple things for one call or one event and that will keep listening
      > to all side and keep in sync."

      > "we need to really make this strong."

      ## Infrastructure Target

      ```
      Machine 1: Fleet Alpha
        ├── LocalAI Cluster 1 (GPU: 8GB VRAM)
        ├── OpenClaw Gateway + MC
        └── 10 Agents (alpha-prefixed)

      Machine 2: Fleet Bravo
        ├── LocalAI Cluster 2 (GPU: 8GB VRAM)
        ├── OpenClaw Gateway + MC
        └── 10 Agents (bravo-prefixed)

      Shared: Plane (one instance), GitHub, ntfy
      LocalAI Peering: Cluster 1 ↔ Cluster 2 (load balance, failover)
      ```

      ## 5 Stages

      1. Make LocalAI Functional — assess, get inference working, benchmark
      2. Route Simple Operations — build router, bypass LLM for HTTP calls
      3. Progressive Offload — heartbeats, simple reviews, chat on LocalAI
      4. Reliability and Failover — graceful degradation, cluster peering
      5. Near-Independent Operation — 80%+ Claude reduction, survive outages

  - title: "AICP — Current State Assessment"
    content: |
      # AICP Current State (2026-03-29)

      ## LocalAI: FUNCTIONAL
      - 9 models loaded (hermes, hermes-3b, codellama, phi-2, llava, whisper, piper-tts, bge-reranker, stablediffusion)
      - OpenAI-compatible API working on localhost:8090
      - hermes-3b (3B): 10s cold, 1.2s warm — TARGET for heartbeats
      - Single-active backend: one GPU model at a time (8GB VRAM)
      - GPU via WSL2 /dev/dxg, CUDA 12

      ## AICP Package: EXISTS
      - 46 Python modules in aicp/
      - core/ — controller, router, modes, pipeline, session, budget, metrics
      - backends/ — localai.py, claude_code.py
      - guardrails/ — checks, paths, response filtering
      - 67 test files (988 passing on Python 3.8, 135 need 3.11 for MCP)

      ## What's Missing
      - Inference router not built yet (Stage 2)
      - No integration between AICP controller and fleet orchestrator
      - Think/Edit/Act modes defined but not enforced end-to-end
      - No LocalAI → Claude fallback logic

# ═══════════════════════════════════════════════════════════════════════════
# EPIC DETAILS — Rich content for each module
# The PM reads these to understand what to plan and break down
# ═══════════════════════════════════════════════════════════════════════════

epic_details:
  "Stage 1: Make LocalAI Functional":
    priority: high
    target_sprint: 1
    acceptance_criteria:
      - LocalAI API responds to chat completion requests consistently
      - At least hermes-3b (3B) and hermes (7B) models load and respond correctly
      - OpenAI-compatible client libraries can connect and get responses
      - Benchmark documented — latency p50/p95, tokens/sec, quality score for structured responses
      - 2-cluster network verified — both machines running LocalAI, cross-machine inference works
    dependencies: []
    notes: |
      ASSESSMENT DONE (2026-03-29): LocalAI is functional. 9 models loaded.
      hermes-3b benchmarked at 10s cold / 1.2s warm. OpenAI API verified.

      Remaining: 2-cluster network verification (Machine 2 setup).
      PM should focus remaining Stage 1 work on the cluster setup and
      comprehensive benchmarking across all target operations.

      > "we will need to validate the project and make sure we can support
      > all that properly too. this will be work."

  "Stage 2: Route Simple Operations to LocalAI":
    priority: high
    target_sprint: 2
    acceptance_criteria:
      - fleet/core/inference_router.py exists and routes by operation type
      - Heartbeat checks route to LocalAI (verified with real agent heartbeat)
      - fleet_read_context executes as direct API call — zero LLM tokens consumed
      - fleet_agent_status executes as direct API call — zero LLM tokens consumed
      - Offload percentage measured and documented (target: 30%+ of operations)
    dependencies:
      - "Stage 1: Make LocalAI Functional"
    notes: |
      The router is the critical architecture piece. It sits between the fleet
      control plane and the AI backends, deciding what needs reasoning vs what
      can be handled locally or as direct HTTP calls.

      Key insight: many MCP tool calls are just HTTP requests to the MC API.
      They don't need an LLM at all — they can be direct API calls.

      > "it should only call claude when needed otherwise do mcp / tool calls
      > and whatever"

      > "especially for very well defined and structured orders or directives
      > that we can find out how to route perfectly to the right model and tools
      > everytime for a mix of multiple advantages"

      Smart chains matter here — one event triggers multiple things:
      > "smart tools, chains that will trigger multiple things for one call or
      > one event and that will keep listening to all side and keep in sync"

  "Stage 3: Progressive Offload":
    priority: medium
    target_sprint: 3
    acceptance_criteria:
      - Idle heartbeats run on LocalAI — zero Claude tokens for no-work heartbeats
      - Simple task acceptance via LocalAI — structured plan output validated
      - Simple reviews (test pass/fail) via LocalAI — pattern matching verified
      - Quality validation report — side-by-side LocalAI vs Claude per operation
      - No quality regression on offloaded operations (measured, not assumed)
    dependencies:
      - "Stage 2: Route Simple Operations to LocalAI"
    notes: |
      Quality validation is the gate. Every operation that moves to LocalAI
      must be validated side-by-side against Claude. The PM should create
      quality gate tasks for each operation type being offloaded.

      This is where the real token savings begin. Each idle heartbeat today
      costs ~8K Claude tokens. With 10 agents at 30-90 minute intervals,
      that's thousands of tokens per hour on "no work" heartbeats.

      > "especially for things and loops and events that do not require heavy
      > works"

      The pace must be reasonable:
      > "ready to put into work safely the agent into moving toward the target
      > at a reasonable pace with proper guidance and flow"

  "Stage 4: Reliability and Failover":
    priority: medium
    target_sprint: 4
    acceptance_criteria:
      - LocalAI failure triggers automatic Claude fallback (transparent to agents)
      - Claude rate limit triggers work queue for LocalAI where possible
      - Cross-machine cluster peering working (Machine 1 ↔ Machine 2)
      - Load balancing between clusters verified under real traffic
      - Health monitoring dashboard for both inference backends
    dependencies:
      - "Stage 3: Progressive Offload"
    notes: |
      Graceful degradation is essential. Agents should never know which backend
      they're talking to. The control plane handles routing transparently.

      This stage also sets up the multi-machine infrastructure:
      > "having our full 2 cluster LocalAI peered in the network with one
      > Plane and eventually 2 or even 3 fleets"

  "Stage 5: Near-Independent Operation":
    priority: low
    target_sprint: 5
    acceptance_criteria:
      - 80%+ of fleet operations run on LocalAI (measured over 1 week)
      - Claude used only for complex code, architecture, security, strategic planning
      - Fleet survives a 1-hour Claude outage with degraded but functional operation
      - Token cost reduction documented with before/after comparison
      - Continuous optimization process defined and running
    dependencies:
      - "Stage 4: Reliability and Failover"
    notes: |
      This is the long-term target. It may take months to reach. The key metric
      is the percentage of operations running locally and the quality of those
      operations compared to Claude.

      > "make it more and more reliable to offload as much as possible the work
      > from claude till one day maybe even if probably not entirely even try to
      > actually run independently as much as possible"

      The vision is multiple fleets, multiple clusters, one Plane:
      > "having our full 2 cluster LocalAI peered in the network with one Plane
      > and eventually 2 or even 3 fleets. there will be multiple stage to this
      > including trial of the multiple features and attempt to put in place"

  "Core Platform":
    priority: high
    target_sprint: 1
    acceptance_criteria:
      - Think/Edit/Act mode enforcement working end-to-end
      - Backend routing (LocalAI vs Claude) functional via config
      - Guardrails enforced — path protection, secrets filtered, command allowlist
      - Configuration via YAML, not hardcoded
    dependencies: []
    notes: |
      The core AICP primitives. The aicp/ package already has 46 modules
      including controller.py, router.py, modes.py, guardrails/.
      Assessment needed: what works, what's wired up, what's missing.

      > "it should only call claude when needed otherwise do mcp / tool calls"
      > "we need to really make this strong."

  "Integrations":
    priority: medium
    target_sprint: 2
    acceptance_criteria:
      - LocalAI integration via OpenAI-compatible API verified end-to-end
      - Claude Code integration via subprocess verified
      - Both backends configurable via YAML config
      - Health check endpoint for each backend
      - Model warmup strategy documented (keep 3B warm for heartbeats)
    dependencies:
      - "Core Platform"
    notes: |
      The backend integrations connect AICP to the actual inference providers.
      LocalAI is at localhost:8090, Claude Code is invoked as subprocess.
      The key challenge is model management — single-active backend means
      only one GPU model loaded at a time (8GB VRAM limit).

      Strategy: keep hermes-3b warm for heartbeats, swap to hermes/codellama
      for heavy work, phi-2 as CPU fallback.

