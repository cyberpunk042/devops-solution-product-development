- identifier: OF
  name: OpenClaw Fleet
  emoji: 🦞
  description: 'Fleet operations, MCP tools, orchestrator, agents. 10 autonomous AI agents managed through OpenClaw gateway
    and Mission Control. Standards, skills, review chains, IRC channels, budget monitoring.

    '
  github: cyberpunk042/openclaw-fleet
  network: 2
  views:
    modules: true
    cycles: true
    issue_views: true
    pages: true
  states:
  - name: Backlog
    group: backlog
    color: '#9CA3AF'
  - name: Todo
    group: unstarted
    color: '#3B82F6'
    default: true
  - name: Dispatched
    group: started
    color: '#F59E0B'
  - name: In Review
    group: started
    color: '#A855F7'
  - name: Done
    group: completed
    color: '#22C55E'
  - name: Cancelled
    group: cancelled
    color: '#EF4444'
  modules:
  - name: Core
    description: 'Orchestrator (the brain — 30s cycle, 6 steps), daemons (sync/monitor/auth/orchestrator), effort profiles
      (full/conservative/minimal/paused), budget monitoring (real Claude OAuth quota), task scoring (priority-based dispatch
      ordering).


      The orchestrator is the fleet control plane — no LLM, pure Python logic. It dispatches tasks, evaluates parents, wakes
      drivers, checks health.


      Missing: chain runner (M-SC02) to execute event chains from MCP tools.'
  - name: MCP
    description: '13 MCP tools that agents call during sessions. The primary interface between agents and the fleet.


      Current: fleet_read_context, fleet_task_accept, fleet_task_progress, fleet_commit, fleet_task_complete, fleet_alert,
      fleet_pause, fleet_escalate, fleet_notify_human, fleet_chat, fleet_task_create, fleet_approve, fleet_agent_status.


      Missing: Plane MCP tools (M-SC04) — fleet_plane_list_sprint, fleet_plane_sync, etc. PM agent currently cannot interact
      with Plane from inside a session.


      Tools currently do individual API calls. Target: emit event chains (M-SC03) so one tool call publishes to all surfaces.'
  - name: Agents
    description: 'Agent roles (primary + secondary), heartbeats (per-agent intervals 30-90m), lifecycle (ACTIVE→IDLE→SLEEPING→OFFLINE),
      behavioral security, SOUL.md identities.


      Each agent has a primary role and secondary responsibilities when idle. fleet-ops drives OCMC, PM drives Plane. Others
      contribute to backlog when free.


      Agent identities are fleet-namespaced for multi-fleet: {prefix}-{role}.'
  - name: Infrastructure
    description: Gateway, IRC (10 channels), ntfy (3 topics), setup scripts, Docker
  - name: Autonomy
    description: 'Event chains (model built, runner missing M-SC02), routing engine (capability matching), self-healing (gateway
      restart in monitor daemon), stuck detection, config auto-push, agent command center (PRE→PROGRESS→POST lifecycle — not
      built).


      29 NOT STARTED milestones in fleet-autonomy-milestones.md. Long-term work.


      The chain system is the critical missing piece — chain builders exist for task_complete, alert, sprint_complete but
      nothing executes them. MCP tools bypass chains entirely.'
  - name: Tests
    description: Unit tests, integration tests, verification scripts
  cover_image: https://images.unsplash.com/photo-1558494949-ef010cbdcc31?w=1200
  logo_props:
    icon:
      name: hub
      color: '#EF4444'
    in_use: icon
- identifier: DSPD
  name: DevOps Solution Product Development
  emoji: 📋
  description: 'DevOps Solution Product Development — project management surface for the fleet built on self-hosted Plane.
    The PM agent bridges Plane (sprints, epics, analytics) ↔ OCMC (agent dispatch).

    '
