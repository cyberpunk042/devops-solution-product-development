- title: DSPD Architecture
  content: "# DSPD вҖ” Three Surfaces Architecture\n\n```\nв”Ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”җ\n\
    в”Ӯ  PLANE (DSPD)                    Project Management Surface  в”Ӯ\nв”Ӯ  sprints В· cycles В· modules В· epics В· analytics В·\
    \ wiki       в”Ӯ\nв”Ӯ  Primary users: human, PM agent                              в”Ӯ\nв””в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”¬в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҳ\n\
    \                              в”Ӯ  PM agent bridges\nв”Ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв–јв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”җ\n\
    в”Ӯ  OCMC (Mission Control)     Agent Operations Surface         в”Ӯ\nв”Ӯ  task dispatch В· heartbeat В· board memory В· approvals\
    \        в”Ӯ\nв”Ӯ  Primary users: fleet agents                                 в”Ӯ\nв””в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”¬в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҳ\n\
    \                              в”Ӯ  all agents\nв”Ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв–јв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”җ\nв”Ӯ  GitHub\
    \                     Code Surface                     в”Ӯ\nв”Ӯ  PRs В· CI В· code review В· releases                       \
    \    в”Ӯ\nв”Ӯ  Primary users: human, all agents                            в”Ӯ\nв””в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҳ\n\
    ```\n\n## Key Rules\n\n1. PM agent is the sole writer to Plane\n2. OCMC and Plane are NOT the same thing\n3. Separate\
    \ Docker Compose вҖ” Plane isolated from OCMC\n4. No shared PostgreSQL\n5. Webhook HMAC verification is mandatory\n"
  content_html: '

    <h1>DSPD вҖ” Three Surfaces Architecture</h1>


    <h2>How the Surfaces Connect</h2>

    <table>

    <thead><tr><th>Surface</th><th>Purpose</th><th>Primary Users</th></tr></thead>

    <tbody>

    <tr><td><strong>Plane (DSPD)</strong></td><td>Project management вҖ” sprints, epics, analytics, wiki</td><td>Human, PM agent</td></tr>

    <tr><td><strong>OCMC (Mission Control)</strong></td><td>Agent operations вҖ” dispatch, heartbeat, approvals</td><td>Fleet
    agents</td></tr>

    <tr><td><strong>GitHub</strong></td><td>Code surface вҖ” PRs, CI, code review, releases</td><td>Human, all agents</td></tr>

    </tbody>

    </table>


    <h2>The PM Bridge</h2>

    <p>The project-manager agent is the <strong>sole bridge</strong> between Plane and OCMC:</p>

    <ol>

    <li>Human creates work items in Plane (sprints, stories, epics)</li>

    <li>PM reads Plane вҶ’ creates corresponding OCMC tasks for agents</li>

    <li>Agent completes OCMC task вҶ’ PM updates Plane item with results</li>

    <li>Human sees progress in Plane (burn-down, velocity, analytics)</li>

    </ol>


    <h2>Key Rules</h2>

    <ol>

    <li><strong>PM is the sole writer to Plane</strong> вҖ” no other agent writes directly</li>

    <li><strong>OCMC and Plane are NOT the same thing</strong> вҖ” different purposes</li>

    <li><strong>Separate Docker Compose</strong> вҖ” Plane isolated from OCMC</li>

    <li><strong>No shared PostgreSQL</strong> вҖ” operational coupling risk too high</li>

    <li><strong>Webhook HMAC verification mandatory</strong> вҖ” never process unverified events</li>

    </ol>


    <h2>Links</h2>

    <ul>

    <li><a href="https://github.com/cyberpunk042/devops-solution-product-development">GitHub: DSPD</a></li>

    <li><a href="https://github.com/cyberpunk042/devops-solution-product-development/blob/main/docs/architecture.md">Architecture
    Document</a></li>

    </ul>

    '
- title: DSPD Phase Status
  content: '# DSPD Phases


    ## Phase 0: Foundation вң…

    Architecture, requirements, CLAUDE.md, pyproject.toml.


    ## Phase 1: Self-Host Plane вҖ” IN PROGRESS

    Docker compose, setup.sh IaC, workspace, projects, API.


    ## Phase 2: Fleet CLI

    plane_client.py, plane.py CLI, plane_sync.py.

    Code exists вҖ” copied from openclaw-fleet. Needs end-to-end testing.


    ## Phase 3: MCP Integration

    Webhook handler (dspd/webhooks.py), Plane MCP for PM, event routing.


    ## Phase 4: Full DSPD

    Multi-project, analytics, velocity, cross-project dependencies.

    '
  content_html: '

